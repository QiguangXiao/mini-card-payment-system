spring:
  application:
    # application name 会进入 Actuator/Micrometer tags，生产排查时用于区分服务。
    name: mini-card-payment-system
  datasource:
    # ${ENV:default} 是 Spring Boot relaxed binding 的常见写法：
    # 本地有默认值，CI/生产可用环境变量覆盖，不需要改代码或提交敏感配置。
    url: ${DB_URL:jdbc:mysql://localhost:3306/mini_card}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:rootpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      # Schema migration 交给 Liquibase；不要再启用 Spring SQL init，
      # 否则会绕过 versioned migration，旧表也仍然不会被真正迁移。
      mode: never
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      # Broker acknowledgements and idempotent producer retries reduce duplicate
      # writes inside Kafka, but consumers must still deduplicate Outbox events.
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 10000
        request.timeout.ms: 3000
    consumer:
      # Offsets are committed only after a listener returns successfully.
      # Database side effects remain idempotent because Kafka and MySQL cannot
      # participate in one atomic local transaction.
      enable-auto-commit: false
      auto-offset-reset: earliest
    listener:
      ack-mode: record
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 1s

management:
  endpoints:
    web:
      exposure:
        # 只暴露interview和本地排查最常用的 Actuator endpoint；heapdump/env 等高风险诊断端点不要公开。
        include:
          - health
          - info
          - metrics
  endpoint:
    health:
      # 开启 /actuator/health/liveness 和 /actuator/health/readiness，
      # 方便解释 liveness/readiness probe 的区别。
      probes:
        enabled: true
      group:
        readiness:
          # MySQL 是授权、入账、还款等状态变更的核心依赖；DB 不可用时应停止接新流量，而不是误报 ready。
          include:
            - readinessState
            - db
      show-details: never
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    purpose: mini credit-card issuer backend for learning and interview practice

mybatis:
  # mapper-locations 把 XML SQL 与 mapper interface 连接起来。
  # 如果路径配错，应用可能启动后第一次调用 repository 才暴露 "invalid bound statement"。
  mapper-locations: classpath:mappers/**/*.xml

messaging:
  topics:
    authorization-events: mini-card.authorization-events.v1
    transaction-events: mini-card.transaction-events.v1
    repayment-events: mini-card.repayment-events.v1
    notification-dead-letter: mini-card.notification.dlt.v1
    risk-feature-dead-letter: mini-card.authorization-risk-feature.dlt.v1
    ledger-dead-letter: mini-card.ledger.dlt.v1
  consumers:
    notification:
      group-id: mini-card-notification-v1
    risk-feature:
      group-id: mini-card-risk-feature-v1
    ledger:
      group-id: mini-card-ledger-v1
    dead-letter-monitor:
      group-id: mini-card-dead-letter-monitor-v1

outbox:
  publisher:
    enabled: true
    fixed-delay-ms: 1000
    recovery-fixed-delay-ms: 5000
    batch-size: 50
    send-timeout-ms: 5000
    processing-timeout-seconds: 30
    max-attempts: 10
    worker-pool-size: 4
    worker-queue-capacity: 100

delay-jobs:
  scheduler:
    enabled: true
    fixed-delay-ms: 1000
    recovery-fixed-delay-ms: 5000
    max-per-run: 100
    max-attempts: 10
    processing-timeout-seconds: 60
    worker-pool-size: 4
    worker-queue-capacity: 100

snapshot-cache:
  enabled: true
  key-prefix: mini-card
  caches:
    statement-read-model-v1:
      # L1 Caffeine 只做很短的 in-process cache，降低高频 GET 打到 Redis/DB 的压力。
      # 多 pod 场景下其他实例的 L1 不会被本实例 evict，所以 local TTL 必须短。
      local-ttl: 30s
      maximum-size: 1000
      # L2 Redis 保存跨实例共享读模型，TTL 比 L1 长，但仍不缓存写模型或强一致决策。
      remote-ttl: 5m
      # 给 Redis TTL 加抖动，避免一批账单在同一秒一起过期造成 cache avalanche。
      remote-ttl-jitter: 30s
    card-snapshot-v1:
      # Card snapshot 会参与 authorization/posting 决策，风险高于纯展示型 read model。
      # 因此 TTL 设置得更短；未来如果加入 block/unblock card API，写路径必须 after-commit evict。
      local-ttl: 10s
      maximum-size: 5000
      remote-ttl: 1m
      remote-ttl-jitter: 10s

authorization:
  policy:
    single-transaction-limits:
      JPY: 100000.00
      USD: 1000.00

statement:
  batch:
    enabled: true
    # BillingCycleScheduler 每天按 JST 醒来一次，只负责创建 statement_batch 和 statement_jobs。
    cron: "0 0 1 * * *"
    zone: Asia/Tokyo
    # 学习项目先采用产品级固定账单日，不做客户自定义 billing day。
    # 默认 31 表示月末关账；次日批处理上一周期，避免关账日白天迟到交易漏入账单。
    close-day-of-month: 31
    # 25 日常见为工资日；默认 27 日扣款，若 27 日是周末或日本节假日则顺延到下一个营业日。
    payment-base-day-of-month: 27
    # 每个 durable statement_job 目标账户数；百万账户会被拆成约 1000 个分片任务。
    target-accounts-per-job: 1000
  jobs:
    enabled: true
    fixed-delay-ms: 1000
    recovery-fixed-delay-ms: 10000
    max-per-run: 20
    max-attempts: 10
    processing-timeout-seconds: 300
    worker-pool-size: 4
    worker-queue-capacity: 100
  policy:
    # minimum payment = min(total, max(total * rate, currency floor)).
    # 当前只是教学用简化规则，真实发卡系统会按产品条款、余额分层和监管要求配置。
    minimum-payment-rate: 0.10
    minimum-payment-floors:
      JPY: 1000.00
      USD: 25.00

repayment:
  auto-debit:
    # 默认模拟银行扣款成功；改成 FAILED 可演示 DelayJob retry/DEAD 的失败路径。
    simulated-result: SUCCESS
    failure-reason: simulated insufficient bank balance

risk:
  local:
    velocity-window-seconds: 60
    max-authorizations-per-window: 3
    high-risk-amount-thresholds:
      JPY: 50000.00
      USD: 500.00
    blocked-merchant-ids:
      - merchant-blocked
  external:
    base-url: ${EXTERNAL_RISK_BASE_URL:http://localhost:8080}
    simulated-latency-millis: 100
    failure-rate-percent: 0
    high-risk-score-threshold: 80

resilience4j:
  circuitbreaker:
    instances:
      externalRisk:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
