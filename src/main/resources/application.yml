spring:
  application:
    # application name 会进入 Actuator/Micrometer tags，生产排查时用于区分服务。
    name: mini-card-payment-system
  datasource:
    # 这里就是本项目的 MySQL 连接配置，不再单独发明 mysql: 子树。
    # Spring Boot 会读取 spring.datasource.* 创建 DataSource/Hikari pool；
    # 如果改成自定义 mysql.*，除非再写 @ConfigurationProperties + DataSource bean，
    # 否则 MyBatis、Liquibase、transaction boundary 都不会自动接上这组配置。
    # ${ENV:default} 是 Spring Boot relaxed binding 的常见写法：
    # 本地有默认值，CI/生产可用环境变量覆盖，不需要改代码或提交敏感配置。
    url: ${DB_URL:jdbc:mysql://localhost:3306/mini_card}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:rootpassword}
    # driver-class-name 对 MySQL 8 通常可由 URL 推断；这里显式写出来，是为了让学习者一眼看出
    # 当前 persistence source of truth 是 MySQL，而不是 H2/PostgreSQL/内存库。
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      # Schema migration 交给 Liquibase；不要再启用 Spring SQL init，
      # 否则会绕过 versioned migration，旧表也仍然不会被真正迁移。
      mode: never
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    # spring.kafka.* 是 Kafka client 的技术配置：连哪个 broker、producer 怎么确认、consumer 怎么提交 offset。
    # 业务上的 topic 名和 consumer group 放在下面的 messaging.*，避免把"传输机制"和"事件契约"混在一起。
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      # interview 重点：acks=all 要求 leader 等待 in-sync replicas 确认后才算发送成功。
      # 它提高 durable write 的可靠性，但不是端到端 exactly-once：DB transaction 已提交、Kafka 发送失败时，
      # 仍然要靠 Outbox 表 + retry/recoverer 补发。
      acks: all
      properties:
        # idempotent producer 让同一个 producer session 的 retry 不会因为网络抖动而在 Kafka 内写出重复 batch。
        # 反事实：如果关闭它，producer 发出消息但 ack 丢了，重试可能让 broker 接收两份相同 record。
        # 边界：它不解决 consumer 重复消费，也不解决 MySQL 和 Kafka 之间没有原子事务的问题；
        # 本项目仍然用 Inbox 和业务唯一键做 consumer-side idempotency。
        enable.idempotence: true
        # 开启 idempotence 时 Kafka 要求 in-flight request 不能超过 5。
        # 这个值保留 producer pipeline 吞吐，同时避免 retry 乱序破坏 per-partition ordering guarantee。
        max.in.flight.requests.per.connection: 5
        # delivery.timeout.ms 是一次 send 从入队到最终成功/失败的总上限。
        # 它必须大于 request.timeout.ms 和内部 retry backoff，否则还没等 broker 恢复就过早失败。
        delivery.timeout.ms: 10000
        # request.timeout.ms 是等待单次 broker 响应的上限。
        # 设置得太长会让 Outbox worker 线程被慢 broker 钉住；太短会制造不必要的 retry。
        request.timeout.ms: 3000
    consumer:
      # 关闭 auto commit 后，offset 只在 listener 成功返回后提交。
      # 反事实：如果自动提交，consumer 可能先提交 offset，随后写 MySQL 失败，消息就不会被再次投递。
      # 这仍然是 at-least-once，不是 exactly-once：listener 成功写库但提交 offset 前崩溃时，Kafka 会重放；
      # 所以 Inbox claim 和业务唯一约束必须能安全处理 duplicate delivery。
      enable-auto-commit: false
      # earliest 适合本地学习和新 consumer group：group 第一次启动时从 topic 开头读，方便重放演示。
      # 生产中是否用 earliest 要结合 retention、replay 策略和是否能承受历史消息重放来决定。
      auto-offset-reset: earliest
    listener:
      # record ack 表示每条消息处理成功后提交 offset。
      # 它比 batch ack 更容易定位坏消息，也更贴合本项目"每个 event 一次 Inbox 幂等处理"的教学目标。
      ack-mode: record
  cloud:
    openfeign:
      client:
        config:
          external-risk:
            # 外部风控还在 authorization transaction 内调用，所以 HTTP timeout 是连接被钉住多久的硬上限。
            # 如果不显式设置，供应商 brownout 时 socket 等待可能先耗尽 Hikari/Tomcat，再等 CircuitBreaker 反应。
            connect-timeout: 300
            read-timeout: 800
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 1s

management:
  endpoints:
    web:
      exposure:
        # 只暴露interview和本地排查最常用的 Actuator endpoint；heapdump/env 等高风险诊断端点不要公开。
        include:
          - health
          - info
          - metrics
  endpoint:
    health:
      # 开启 /actuator/health/liveness 和 /actuator/health/readiness，
      # 方便解释 liveness/readiness probe 的区别。
      probes:
        enabled: true
      group:
        readiness:
          # MySQL 是授权、入账、还款等状态变更的核心依赖；DB 不可用时应停止接新流量，而不是误报 ready。
          include:
            - readinessState
            - db
      show-details: never
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    purpose: mini credit-card issuer backend for learning and interview practice

mybatis:
  # mapper-locations 把 XML SQL 与 mapper interface 连接起来。
  # 如果路径配错，应用可能启动后第一次调用 repository 才暴露 "invalid bound statement"。
  mapper-locations: classpath:mappers/**/*.xml

messaging:
  # messaging.* 是本项目自己的 typed configuration，不是 Spring Boot 内建前缀。
  # 它描述"本系统有哪些 integration event channel"，由 KafkaTopicsProperties 和 @KafkaListener 占位符使用。
  # 这样将来即使 transport 从 Kafka 换成别的消息系统，业务 topic/group 命名仍然有一个清晰入口。
  topics:
    # topic 按业务事实拆开，而不是所有事件塞进一个大 topic：
    # producer/consumer 可以按生命周期订阅，DLT 和 replay 范围也更小。
    authorization-events: mini-card.authorization-events.v1
    transaction-events: mini-card.transaction-events.v1
    statement-events: mini-card.statement-events.v1
    repayment-events: mini-card.repayment-events.v1
    # DLT(dead-letter topic) 按 consumer 职责拆开。
    # Notification 坏消息不应该阻塞 Risk projection 或 Ledger projection 的排查/重放。
    notification-dead-letter: mini-card.notification.dlt.v1
    risk-feature-dead-letter: mini-card.authorization-risk-feature.dlt.v1
    ledger-dead-letter: mini-card.ledger.dlt.v1
  consumers:
    # group-id 表示同一个 bounded context 的一组实例共同消费。
    # 同一 topic 可以被 notification/risk/ledger 多个 group 独立消费，互不抢 offset。
    notification:
      group-id: mini-card-notification-v1
    risk-feature:
      group-id: mini-card-risk-feature-v1
    ledger:
      group-id: mini-card-ledger-v1
    dead-letter-monitor:
      group-id: mini-card-dead-letter-monitor-v1

outbox:
  publisher:
    # Outbox 是 reliable event publication：业务事务先把 event 写入 MySQL outbox_events，
    # 后台 publisher 再异步发 Kafka。它解决"DB 已提交但消息没发出去"的 partial failure。
    enabled: true
    # fixed-delay-ms 控制 poller 扫描 NEW/FAILED event 的频率；不是业务 SLA。
    # 真正的 correctness 来自 row lock / lease / retry / idempotency，而不是扫得越快越安全。
    fixed-delay-ms: 1000
    # recoverer 专门捞超时的 PROCESSING event。
    # 如果 worker 在 Kafka ack 前后崩溃，没有这条恢复路径，event 会永远卡在 PROCESSING。
    recovery-fixed-delay-ms: 5000
    batch-size: 50
    send-timeout-ms: 5000
    # PROCESSING lease 必须覆盖一次正常 publish + ack + finalize。
    # 太短会让 recoverer 抢走仍在发送中的 event；太长会拖慢真实宕机后的恢复。
    processing-timeout-seconds: 30
    max-attempts: 10
    worker-pool-size: 4
    worker-queue-capacity: 100

delay-jobs:
  scheduler:
    # DelayJob 是 future business action scheduling：例如 authorization expiry、auto repayment。
    # 它和 Outbox 都有 poll/claim/worker/recoverer，但语义不同：
    # Outbox 发"已经发生的事实"，DelayJob 触发"到点要执行的动作"。
    enabled: true
    fixed-delay-ms: 1000
    recovery-fixed-delay-ms: 5000
    max-per-run: 100
    max-attempts: 10
    processing-timeout-seconds: 60
    worker-pool-size: 4
    worker-queue-capacity: 100

notification:
  delivery:
    # 关掉后只创建 PENDING delivery、不实际外发，便于迁移/排查时隔离副作用。
    enabled: true
    fixed-delay-ms: 1000
    recovery-fixed-delay-ms: 5000
    batch-size: 50
    # PROCESSING lease 超时秒数：必须 > 一次"provider 调用(含 Resilience4j 重试) + finalize"的正常耗时，
    # 否则正常投递还没结束 lease 就过期，recoverer 会重复领取。
    processing-timeout-seconds: 30
    max-attempts: 8
    worker-pool-size: 4
    worker-queue-capacity: 100
    sender-threads: 4
    # 模拟 provider 的延迟/失败注入：默认 0 失败，改大可演示 TimeLimiter 超时与重试/断路/DEAD。
    simulated-latency-millis: 20
    simulated-failure-rate-percent: 0

authorization:
  policy:
    single-transaction-limits:
      JPY: 100000.00
      USD: 1000.00

statement:
  batch:
    enabled: true
    # BillingCycleScheduler 每天按 JST 醒来一次，只负责对账式补建缺失的 statement_jobs。
    cron: "0 0 1 * * *"
    zone: Asia/Tokyo
    # 学习项目先采用产品级固定账单日，不做客户自定义 billing day。
    # 默认 31 表示月末关账；次日批处理上一周期，避免关账日白天迟到交易漏入账单。
    close-day-of-month: 31
    # 25 日常见为工资日；默认 27 日扣款，若 27 日是周末或日本节假日则顺延到下一个营业日。
    payment-base-day-of-month: 27
    # 每天醒来时对最近几个已过去关账周期做 reconciliation，防止 missed cron 导致账单分片永远不创建。
    reconciliation-lookback-cycles: 2
    # 每个 durable statement_job 目标账户数；百万账户会被拆成约 1000 个分片任务。
    target-accounts-per-job: 1000
  jobs:
    enabled: true
    fixed-delay-ms: 1000
    recovery-fixed-delay-ms: 10000
    max-per-run: 20
    max-attempts: 10
    processing-timeout-seconds: 300
    worker-pool-size: 4
    worker-queue-capacity: 100
  policy:
    # minimum payment = min(total, max(total * rate, currency floor)).
    # 当前只是教学用简化规则，真实发卡系统会按产品条款、余额分层和监管要求配置。
    minimum-payment-rate: 0.10
    minimum-payment-floors:
      JPY: 1000.00
      USD: 25.00
  read-cache:
    # Statement GET read model 的两级 cache：Caffeine L1 + Redis L2。
    # 只缓存可从 MySQL 重建的查询快照，不缓存额度、幂等 claim 或写模型。
    # L1 很快但只在本 JVM 生效，所以 TTL 要短；L2 跨实例共享，所以 TTL 可以稍长。
    local-ttl: 30s
    # 生产 cache 必须有容量上限，避免无限 key 把应用 heap 吃满。
    local-maximum-size: 1000
    remote-ttl: 5m
    # 在基础 TTL 上加随机抖动，避免一批 key 同秒过期后一起回源 MySQL。
    remote-ttl-jitter: 30s
    # 还款 after-commit 写入 L2 的"版本地板"墓碑存活时间。它挡住"迟到写"覆盖新值，
    # 只需活到第一个新鲜 reader 用真实值替换墓碑为止，所以远短于 remote-ttl。
    # 取值要 >= 一个慢 GET 从"读 DB"到"写回 L2"的最大时滞。
    tombstone-ttl: 10s
    # 热点 key 重建锁，防缓存击穿(cache breakdown / stampede)：L2 miss 时用一把跨 pod 的 Redis 锁
    # (SET NX PX) 做 single-flight，只有 winner 回源 DB，其余 pod 等它填好 L2 后复用，不重复打库。
    # 它是 best-effort 优化：抢锁失败/超时/Redis 故障一律 fail-open 回源，不是 GET 的硬依赖。
    rebuild-lock-enabled: true
    # 锁持有时间，要 >= 一次"回源 DB + 写回 L2"的正常耗时，否则 winner 没写完锁就过期、放第二个进来；
    # 同时也是持锁者崩溃后的自动释放上限。
    rebuild-lock-ttl: 2s
    # loser 等 winner 填好 L2 的最大自旋次数 × 间隔 = 请求最多被这把锁阻塞多久（这里 5×20ms=100ms 封顶）。
    # 超过后 fail-open 自己回源，绝不让请求无限等在锁上。
    rebuild-lock-wait-attempts: 5
    rebuild-lock-wait-interval: 20ms
    broadcast:
      # 跨 pod L1 失效广播（Redis Pub/Sub）。默认关闭：单实例/测试不需要，跨 pod L1 由 local-ttl 兜底。
      # 开启后，还款 after-commit 会 PUBLISH 一条失效消息，所有 pod 的订阅者清各自 Caffeine L1，
      # 把跨 pod L1 stale 窗口从 local-ttl 压到一次广播延迟。它是 best-effort，丢消息时退回 local-ttl。
      # 它只关 L1 窗口，不解决 L2 late-write 竞态（那要版本号/CAS）。
      enabled: false

repayment:
  auto-debit:
    # 默认模拟银行扣款成功；改成 false 可演示 DelayJob retry/DEAD 的失败路径。
    simulated-success: true
    failure-reason: simulated insufficient bank balance

risk:
  # velocity 限流计数器实现：redis(默认, sliding window, 主库零读压) 或 jdbc(COUNT(*) 精确对照)。
  velocity:
    store: redis
  local:
    velocity-window-seconds: 60
    max-authorizations-per-window: 3
    # 长期画像来自 card_risk_features projection：样本太少时不参与判定，避免一两次失败就打标签。
    min-historical-authorizations: 5
    # 0.80 表示历史拒绝率达到 80% 时把这张卡提高审查档位。它是长窗口 soft signal，不替代 Redis 短窗口 velocity。
    max-historical-decline-rate: 0.80
    # elevated scrutiny 下仍可接受的最高外部风险分：历史画像超阈值的卡，外部即使 approve，
    # 分数 ≥ 60 也会被收紧为拒绝。只在外部参与后生效，所以历史画像永远不会单独把卡永久封死。
    elevated-scrutiny-max-approved-score: 60
    high-risk-amount-thresholds:
      JPY: 50000.00
      USD: 500.00
    blocked-merchant-ids:
      - merchant-blocked
  external:
    base-url: ${EXTERNAL_RISK_BASE_URL:http://localhost:8080}
    simulated-latency-millis: 100
    failure-rate-percent: 0
    high-risk-score-threshold: 80

resilience4j:
  circuitbreaker:
    instances:
      externalRisk:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
      # 每渠道独立断路器：push provider 故障不会连带把 email 熔断。slow-call 阈值让"慢调用"也算失败，
      # 配合 TimeLimiter 一起把"又慢又错"的 provider 快速隔离。
      notificationPush:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 100
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      notificationEmail:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 100
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      # intra-attempt 快速重试：对 provider 抖动做几次内存级退避重试；跨重启的 durable 重试由投递状态机负责。
      notificationDelivery:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  timelimiter:
    instances:
      # 单次 provider 调用的硬超时；超时计为失败，进入 Retry/CircuitBreaker。
      notificationDelivery:
        timeout-duration: 2s
        cancel-running-future: true
  bulkhead:
    instances:
      externalRisk:
        # 使用 semaphore bulkhead，同线程限并发，不把 @Transactional 内的调用丢到另一个线程。
        # 这个值必须小于 Hikari pool 可用连接数减去 headroom：如果 Hikari 是 10，就不能把 risk bulkhead 配成 10。
        # 这样外部风控全堵时，最多只有 max-concurrent-calls 条授权事务占着连接，其他端点仍有余量。
        max-concurrent-calls: 4
        # 0 表示 bulkhead 满时立即 fail-closed，而不是排队继续占 Tomcat request thread。
        max-wait-duration: 0
