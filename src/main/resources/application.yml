# 当前默认配置面向“单实例本地学习 / 小项目”：显式限制同时执行的 request workers，避免 Tomcat 默认
# 200 个线程一起争只有 10 个连接的 Hikari pool。connector 层仍可持有更多连接，见 accept-count 注释。
# 它是 starting point，不是压测后的 SLA。
# 生产大流量参考（例如 4 vCPU/8 GiB、8+ API Pods）：max threads 可从 200~300、accept-count 100~200、
# max-connections 4096~8192 起步，但必须和每 Pod Hikari、RDS 总连接预算、external provider capacity 一起压测；
# 单纯把线程调大不会提高同账户 row lock 或 MySQL writer 的吞吐。
server:
  tomcat:
    threads:
      max: 80
      min-spare: 10
    # accept-count 不是“80 个 worker 满后还能排多少业务请求”：Tomcat 先接受并持有最多
    # max-connections 个连接；达到该上限后，accept-count 才是 OS listen backlog，再满才拒绝新连接。
    # 真正带明确重试语义的主动背压仍是 API RateLimiter 的 429，以及 DB pool 耗尽后的 503。
    accept-count: 50
    max-connections: 2048
    # 等待已接受连接提交 HTTP request line 的时间；必须放在 server.tomcat 下，server.connection-timeout
    # 在 Boot 3 已不绑定。它不是整个 controller 请求的业务 timeout。
    connection-timeout: 3s
    # 不显式配置时 keep-alive 会继承上面的 3s。小项目设 30s 保留连接复用；生产在 ALB 等 LB 后面时，
    # 后端值应略大于 LB idle timeout（例如 LB=60s、后端=65s），避免复用边界产生间歇 502。
    keep-alive-timeout: 30s

spring:
  application:
    # application name 会进入 Actuator/Micrometer tags，生产排查时用于区分服务。
    name: mini-card-payment-system
  datasource:
    # 这里就是本项目的 MySQL 连接配置，不再单独发明 mysql: 子树。
    # Spring Boot 会读取 spring.datasource.* 创建 DataSource/Hikari pool；
    # 如果改成自定义 mysql.*，除非再写 @ConfigurationProperties + DataSource bean，
    # 否则 MyBatis、Liquibase、transaction boundary 都不会自动接上这组配置。
    # ${ENV:default} 是 Spring Boot relaxed binding 的常见写法：
    # 本地有默认值，CI/生产可用环境变量覆盖，不需要改代码或提交敏感配置。
    url: ${DB_URL:jdbc:mysql://localhost:3306/mini_card}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:rootpassword}
    # driver-class-name 对 MySQL 8 通常可由 URL 推断；这里显式写出来，是为了让学习者一眼看出
    # 当前 persistence source of truth 是 MySQL，而不是 H2/PostgreSQL/内存库。
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 小项目推荐：maximum=10 足以覆盖当前学习流量；显式写出是为了不把 library default 当容量设计。
      # 生产大流量参考：每 API Pod 可从 20~30 起步，例如 8 Pods × 25 = 200 条最坏连接；
      # 必须小于 RDS/RDS Proxy 可承载总连接并给 migration、admin、batch 留余量。不要看到 pending 就盲目扩池。
      maximum-pool-size: 10
      minimum-idle: 5
      # 小项目和支付 API 都不应沿用 Hikari 默认 30s 排队；HTTP 侧 1s 后由专门 handler 返回 503，
      # 客户端应等待 Retry-After 并复用原 Idempotency-Key，不能生成新 key。
      # 这个共享 DataSource 同时服务 Kafka listener/worker：池若连续耗尽约 5s，listener 可能在
      # Hikari 1s × 3 次获取 + Kafka FixedBackOff(1s × 2) 后进入 DLT；当前 DLT 尚无 monitor/replay，
      # 这是快速失败换来的明确 trade-off，详见 traffic-rate-limiting-and-capacity-cn.md 的 overload trace。
      # 生产大流量通常从 500~1000ms 起步，再按 API timeout/SLO 校准，并优先隔离 API/consumer/batch workload。
      connection-timeout: 1000
      # 500ms 单独约束坏连接 aliveness check，给 1s 的总获取连接预算保留余量；这是预算拆分而非 Hikari 强制约束。
      validation-timeout: 500
      idle-timeout: 600000
      max-lifetime: 1800000
  sql:
    init:
      # Schema migration 交给 Liquibase；不要再启用 Spring SQL init，
      # 否则会绕过 versioned migration，旧表也仍然不会被真正迁移。
      mode: never
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    # spring.kafka.* 是 Kafka client 的技术配置：连哪个 broker、producer 怎么确认、consumer 怎么提交 offset。
    # 业务上的 topic 名和 consumer group 放在下面的 messaging.*，避免把"传输机制"和"事件契约"混在一起。
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      # interview 重点：acks=all 要求 leader 等待 in-sync replicas 确认后才算发送成功。
      # 它提高 durable write 的可靠性，但不是端到端 exactly-once：DB transaction 已提交、Kafka 发送失败时，
      # 仍然要靠 Outbox 表 + retry/recoverer 补发。
      acks: all
      properties:
        # idempotent producer 让同一个 producer session 的 retry 不会因为网络抖动而在 Kafka 内写出重复 batch。
        # 反事实：如果关闭它，producer 发出消息但 ack 丢了，重试可能让 broker 接收两份相同 record。
        # 边界：它不解决 consumer 重复消费，也不解决 MySQL 和 Kafka 之间没有原子事务的问题；
        # 本项目仍然用 Inbox 和业务唯一键做 consumer-side idempotency。
        enable.idempotence: true
        # 开启 idempotence 时 Kafka 要求 in-flight request 不能超过 5。
        # 这个值保留 producer pipeline 吞吐，同时避免 retry 乱序破坏 per-partition ordering guarantee。
        max.in.flight.requests.per.connection: 5
        # delivery.timeout.ms 是一次 send 从入队到最终成功/失败的总上限。
        # 它必须大于 request.timeout.ms 和内部 retry backoff，否则还没等 broker 恢复就过早失败。
        delivery.timeout.ms: 10000
        # request.timeout.ms 是等待单次 broker 响应的上限。
        # 设置得太长会让 Outbox worker 线程被慢 broker 钉住；太短会制造不必要的 retry。
        request.timeout.ms: 3000
    consumer:
      # 关闭 Kafka consumer 原生自动提交(auto commit)：不要按时间后台提交 offset。
      # 本项目要的是 Spring Kafka listener container 的"处理成功后自动提交"：
      # listener 正常 return 后，再由 container 根据 ack-mode=record 自动提交当前 record 的 offset。
      # 反事实：如果开启 Kafka 原生自动提交，consumer 可能先提交 offset，随后写 MySQL 失败，消息就不会被再次投递。
      # 这仍然是 at-least-once，不是 exactly-once：listener 成功写库但提交 offset 前崩溃时，Kafka 会重放；
      # 所以 Inbox claim 和业务唯一约束必须能安全处理 duplicate delivery。
      enable-auto-commit: false
      # earliest 适合本地学习和新 consumer group：group 第一次启动时从 topic 开头读，方便重放演示。
      # 生产中是否用 earliest 要结合 retention、replay 策略和是否能承受历史消息重放来决定。
      auto-offset-reset: earliest
    listener:
      # record ack 表示每条消息处理成功后，由 Spring Kafka container 自动 ack/commit offset。
      # 这里的"自动提交"不是 enable-auto-commit=true 的后台定时提交，而是 listener return 后的受控提交。
      # 它比 batch ack 更容易定位坏消息，也更贴合本项目"每个 event 一次 Inbox 幂等处理"的教学目标。
      ack-mode: record
  cloud:
    openfeign:
      client:
        config:
          external-risk:
            # 外部风控还在 authorization transaction 内调用，所以 HTTP timeout 是连接被钉住多久的硬上限。
            # 如果不显式设置，供应商 brownout 时 socket 等待可能先耗尽 Hikari/Tomcat，再等 CircuitBreaker 反应。
            connect-timeout: 300
            read-timeout: 800
          notification-provider:
            # 通知 provider 在异步 worker、DB transaction 外调用；这里的 timeout 只钉住 worker 线程，不钉住用户请求。
            # read-timeout 必须大于 notificationPush/Email 的 slow-call-duration-threshold：
            # 1s~2s 之间的"慢但成功"会被 CircuitBreaker 统计；超过 2s 的等待由 Feign 硬切断。
            connect-timeout: 300
            read-timeout: 2000
          bank-debit:
            # 银行扣款在 DelayJob worker、DB transaction 外调用（AutoRepaymentService 刻意不开事务）。
            # timeout 钉住的是专用 auto-repayment worker 线程；超时按失败处理，
            # DelayJob retry 复用同一 idempotencyKey，银行侧去重保证不会重复出金。
            connect-timeout: 300
            read-timeout: 2000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 1s

logging:
  pattern:
    # requestId 来自 HttpRequestLoggingFilter 写入的 MDC(ThreadLocal-backed diagnostic context)。
    # 同步 HTTP 请求内的 controller/service/repository 日志会带值；scheduler/Kafka/worker 这类
    # 非 HTTP 线程为空，这是边界而不是 bug。跨 durable async 要靠 event/job metadata，不靠 MDC。
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] requestId=%X{requestId} %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        # 只暴露interview和本地排查最常用的 Actuator endpoint；heapdump/env 等高风险诊断端点不要公开。
        include:
          - health
          - info
          - metrics
  endpoint:
    health:
      # 开启 /actuator/health/liveness 和 /actuator/health/readiness，
      # 方便解释 liveness/readiness probe 的区别。
      probes:
        enabled: true
      group:
        readiness:
          # MySQL 是授权、入账、还款等状态变更的核心依赖；DB 不可用时应停止接新流量，而不是误报 ready。
          include:
            - readinessState
            - db
      show-details: never
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    purpose: mini credit-card issuer backend for learning and interview practice

mybatis:
  # mapper-locations 把 XML SQL 与 mapper interface 连接起来。
  # 如果路径配错，应用可能启动后第一次调用 repository 才暴露 "invalid bound statement"。
  mapper-locations: classpath:mappers/**/*.xml

messaging:
  # messaging.* 是本项目自己的 typed configuration，不是 Spring Boot 内建前缀。
  # 它描述"本系统有哪些 integration event channel"，由 KafkaTopicsProperties 和 @KafkaListener 占位符使用。
  # 这样将来即使 transport 从 Kafka 换成别的消息系统，业务 topic/group 命名仍然有一个清晰入口。
  # 对应代码：KafkaTopicsProperties。producer 侧 KafkaOutboxMessagePublisher.topicFor() 按
  # outbox_events.event_type 前缀（authorization./card_transaction./...）路由到对应 topic；
  # consumer 侧各 @KafkaListener 用 ${messaging.topics.*}/${messaging.consumers.*.group-id} 占位符订阅。
  topics:
    # topic 按业务事实拆开，而不是所有事件塞进一个大 topic：
    # producer/consumer 可以按生命周期订阅，DLT 和 replay 范围也更小。
    authorization-events: mini-card.authorization-events.v1
    transaction-events: mini-card.transaction-events.v1
    statement-events: mini-card.statement-events.v1
    repayment-events: mini-card.repayment-events.v1
    # DLT(dead-letter topic) 归属 Notification consumer 职责。
    notification-dead-letter: mini-card.notification.dlt.v1
  consumers:
    # group-id 表示同一个 bounded context 的一组实例共同消费。
    # group-id 有两个读者：各 @KafkaListener 的 groupId 占位符（消费进度归属），以及绑定类
    # KafkaConsumersProperties——KafkaConsumerConfiguration 用它构建"失败 group -> DLT"路由表，
    # 失败消息按失败的消费组进自己的 DLT（同一 topic 多 group 消费，不能按 topic 推导）。
    # concurrency 由各 @KafkaListener 的 concurrency 占位符消费，是该 container 的并发线程数。
    # 它和 worker pool size 一样是"处理并行度"，所以统一放 YAML。
    # 有效上限是 topic partition 数（当前 3）：配得更大只会产生分不到 partition 的空闲线程。
    notification:
      group-id: mini-card-notification-v1
      concurrency: 2
    # 当前只由 error handler 把失败 record 写入 notification DLT，没有 @KafkaListener 消费 DLT。
    # 生产补齐时应增加独立 monitor group 订阅 DLT，记录 metric/告警，并在修复根因后受控 replay；
    # 不要收到死信就自动回投 source topic，否则永久坏消息会形成 source -> DLT -> source 的无限循环。

outbox:
  publisher:
    # Outbox 是 reliable event publication：业务事务先把 event 写入 MySQL outbox_events，
    # 后台 publisher 再异步发 Kafka。它解决"DB 已提交但消息没发出去"的 partial failure。
    # 整个前缀绑定到 OutboxProperties（@ConfigurationProperties("outbox.publisher")）。
    enabled: true
    # fixed-delay-ms 控制 poller 扫描 due PENDING event 的频率；不是业务 SLA。
    # 真正的 correctness 来自 row lock / lease / retry / idempotency，而不是扫得越快越安全。
    # 对应代码：OutboxPoller 每轮扫 status='PENDING' AND next_attempt_at<=now（近似 FIFO）。
    fixed-delay-ms: 1000
    # recoverer 专门捞超时的 PROCESSING event。
    # 如果 worker 在 Kafka ack 前后崩溃，没有这条恢复路径，event 会永远卡在 PROCESSING。
    # 对应代码：OutboxRecoverer 扫描 status='PROCESSING' AND next_attempt_at<=now。
    recovery-fixed-delay-ms: 5000
    # 对应代码：OutboxPoller 单轮领取的 LIMIT；一轮最多把这么多行改成 PROCESSING。
    batch-size: 50
    # 对应代码：OutboxWorker.publishClaimedEvent 里 publish(claimedEvent, Duration.ofMillis(sendTimeoutMs))，
    # 即等待 Kafka broker ack 的上限。必须明显小于 processing-timeout-seconds，否则 ack 还没超时 lease 先过期。
    send-timeout-ms: 5000
    # PROCESSING lease 必须覆盖一次正常 publish + ack + finalize。
    # 太短会让 recoverer 抢走仍在发送中的 event；太长会拖慢真实宕机后的恢复。
    # 对应字段：outbox_events.next_attempt_at 在 PROCESSING 时表示 lease deadline（= claim 时刻 + 本值）。
    # 对应代码：OutboxClaimer.markProcessing 写入 deadline + lease_token；OutboxRecoverer 按它判定超时。
    processing-timeout-seconds: 30
    # 对应字段：outbox_events.attempts。达到上限后 OutboxEvent.markFailed 把 status 置 DEAD（outbox 的 DLT-like 状态）。
    max-attempts: 10
    # 对应代码：WorkerExecutorConfiguration 的 outbox 线程池；poller 领取后 submit 给它，
    # 队列满被拒绝时走 OutboxWorker.markRejectedForRetry 放回 retry。
    worker-pool-size: 4
    worker-queue-capacity: 100

delay-jobs:
  scheduler:
    # DelayJob 是 future business action scheduling：例如 authorization expiry、auto repayment。
    # 它和 Outbox 都有 poll/claim/worker/recoverer，但语义不同：
    # Outbox 发"已经发生的事实"，DelayJob 触发"到点要执行的动作"。
    # 整个前缀绑定到 DelayJobProperties；表结构与 outbox_events 对称（status/attempts/next_attempt_at/lease_token）。
    enabled: true
    # 对应代码：DelayJobPoller 扫 delay_jobs status='PENDING' AND next_attempt_at<=now。
    # PENDING 时 next_attempt_at = 首次 scheduled_at 或失败后的 retry 时间。
    fixed-delay-ms: 1000
    # 对应代码：DelayJobRecoverer 扫 status='PROCESSING' AND next_attempt_at<=now（lease 过期 = worker 可能宕机）。
    recovery-fixed-delay-ms: 5000
    # 对应代码：DelayJobPoller 单轮领取上限（LIMIT）。
    # 小项目推荐 16：均匀分布时约为两个 4-thread pool 总并发 8 的 2 倍，减少 queue 中提前燃烧 lease。
    # 类型倾斜时会退化：若 16 条全是 AUTO_REPAYMENT，就是单个 4-thread pool 并发的 4 倍，general pool 空闲。
    # 生产大流量参考：若拆成独立 job Pods、每 Pod 两池各 8 threads，可从 32/Pod 起步；
    # 最终应改成 capacity-aware claim，再用 backlog/oldest-age/queue-reject 压测决定，而不是固定追求更大 batch。
    max-per-run: 16
    # 对应字段：delay_jobs.attempts；达到上限后 DelayJob.markFailed 置 DEAD，等人工处理。
    max-attempts: 10
    # 对应字段：delay_jobs.next_attempt_at 在 PROCESSING 时表示 lease deadline。
    # 对应代码：DelayJobClaimer.markProcessing 写入。比 outbox 的 30s 长，
    # 因为 handler 里可能有业务事务 + 外部调用（如 auto repayment 先走 bank debit）。
    processing-timeout-seconds: 60
    # 对应代码：WorkerExecutorConfiguration 的 delay-job 线程池；拒绝时 DelayJobWorker.markRejectedForRetry。
    # 本池只跑"纯 DB 小事务"类 job（授权过期释放额度），不含外部调用。
    worker-pool-size: 4
    worker-queue-capacity: 100
    # AUTO_REPAYMENT 专用池（对应代码：WorkerExecutorConfiguration.autoRepaymentDelayJobWorkerExecutor，
    # DelayJobPoller 按 jobType 路由）。自动扣款调外部银行网关，最长等到 Feign read-timeout(2s)：
    # 银行 brownout 时钉住的只是本池线程，授权过期在上面的池里照常执行——
    # 舱壁隔离不只在 HTTP 层（circuit breaker），也在线程池层。
    auto-repayment-worker-pool-size: 4
    auto-repayment-worker-queue-capacity: 100

notification:
  delivery:
    # 整个前缀绑定到 NotificationDeliveryProperties；表结构与 outbox_events 对称。
    # Feign client 默认回环调用本应用里的 SimulatedNotificationProviderController；
    # 生产接真实 provider 时改成 SendGrid/FCM/APNs wrapper 的 base URL。
    provider-base-url: ${NOTIFICATION_PROVIDER_BASE_URL:http://localhost:8080}
    # 关掉后只创建 PENDING delivery、不实际外发，便于迁移/排查时隔离副作用。
    enabled: true
    # 对应代码：NotificationDeliveryPoller 扫 notification_deliveries status='PENDING' AND next_attempt_at<=now。
    fixed-delay-ms: 1000
    # 对应代码：NotificationDeliveryRecoverer 扫 status='PROCESSING' AND next_attempt_at<=now。
    recovery-fixed-delay-ms: 5000
    # 对应代码：NotificationDeliveryPoller 单轮领取的 LIMIT。
    # 小项目推荐 40：对齐当前 push 20/s + email 20/s 的每 Pod 总 provider quota，减少持续 reschedule。
    # 生产大流量参考：若 provider 全局 quota=1000/s、10 Pods、保留 20% headroom，则每渠道约 80/s/Pod，
    # batch 可从每 Pod 总可消化量附近起步；必须按“全局 quota ÷ Pod 数 × 安全系数”计算，不能随扩容线性放大。
    batch-size: 40
    # PROCESSING lease 超时秒数：必须 > 一次"provider 调用(含 Resilience4j 重试) + finalize"的正常耗时，
    # 否则正常投递还没结束 lease 就过期，recoverer 会重复领取。
    # 对应字段：notification_deliveries.next_attempt_at 在 PROCESSING 时表示 lease deadline。
    # 对应代码：NotificationDeliveryClaimer.markProcessing 写入 deadline + lease_token。
    processing-timeout-seconds: 30
    # 对应字段：notification_deliveries.attempts；真实 provider failure/lease timeout 才增加。
    # 本地 RateLimiter 或 worker pool 在 HTTP 前拒绝只延后 next_attempt_at，不消耗 attempts。
    max-attempts: 8
    # 对应代码：WorkerExecutorConfiguration.notificationDeliveryWorkerExecutor。
    worker-pool-size: 4
    worker-queue-capacity: 100
    # 模拟 provider 的延迟/失败注入：默认 0 失败；改大可演示 Retry/CircuitBreaker 与 durable retry/DEAD。
    # provider HTTP 硬超时应由真实 HTTP client/SDK 配置，本项目不再为通知发送引入 TimeLimiter 专用线程池。
    simulated-latency-millis: 20
    simulated-failure-rate-percent: 0

authorization:
  policy:
    # 对应代码：AuthorizationPolicyProperties -> AuthorizationService 构造器里预转换成 Map<Currency, Money>，
    # 再由 checkSingleTransactionLimit() 在授权决策链第一步（账户加锁前）使用。
    # 币种不在此表中会直接 decline UNSUPPORTED_CURRENCY——新增币种要先补这里再放流量。
    single-transaction-limits:
      JPY: 100000.00
      USD: 1000.00

statement:
  batch:
    # 整个 statement.* 前缀绑定到 StatementProperties。
    enabled: true
    # BillingCycleScheduler 每天按 JST 醒来一次，只负责对账式补建缺失的 statement_jobs。
    # 对应代码：BillingCycleScheduler 的 @Scheduled(cron=..., zone=...) -> StatementCycleService.createDueJobs()。
    cron: "0 0 1 * * *"
    # zone 同时用于 cron 触发时区和账期日切（periodStart/periodEnd 转 Instant）；
    # 对应代码：StatementCycleService.batchZone()、StatementGenerationService.periodStartInstant()。
    zone: Asia/Tokyo
    # 学习项目先采用产品级固定账单日，不做客户自定义 billing day。
    # 默认 31 表示月末关账；次日批处理上一周期，避免关账日白天迟到交易漏入账单。
    # 对应代码：StatementCycleService.isCloseDate()/periodStartFor()，短月自动落到当月最后一天（dayInMonth）。
    close-day-of-month: 31
    # 25 日常见为工资日；默认 27 日扣款，若 27 日是周末或日本节假日则顺延到下一个营业日。
    # 对应代码：StatementCycleService.paymentDateAfter() + JapaneseBusinessDayCalendar；
    # 结果写入 statement_jobs.due_date，最终成为 statements.due_date 和自动扣款 DelayJob 的触发日。
    payment-base-day-of-month: 27
    # 每天醒来时对最近几个已过去关账周期做 reconciliation，防止 missed cron 导致账单分片永远不创建。
    # 对应代码：StatementCycleService.recentCloseDatesOnOrBefore() 的回看窗口（level-triggered 补建）。
    reconciliation-lookback-cycles: 2
    # 每个 durable statement_job 目标账户数；百万账户会被拆成约 1000 个分片任务。
    # 对应字段：statement_jobs.shard_no/shard_count。对应代码：StatementCycleService.shardCount()。
    target-accounts-per-job: 1000
  jobs:
    # 分片 job 的执行配置。注意 statement_jobs 的 lease 字段和 outbox/delay-jobs 不同：
    # 用 claim_until（deadline）+ claim_token（owner identity），而不是 next_attempt_at + lease_token；
    # claimed_by 只是排查日志里的 worker 名，不作为最终防 stale worker 的唯一凭据。
    enabled: true
    # 对应代码：StatementJobDispatcher 扫 statement_jobs status='PENDING'。
    fixed-delay-ms: 1000
    # 对应代码：StatementJobDispatcher 的 recover 路径，捞 status='PROCESSING' AND claim_until<=now。
    recovery-fixed-delay-ms: 10000
    # 对应代码：StatementJobDispatcher 单轮领取的 LIMIT。分片 job 每个都要处理最多 target-accounts-per-job
    # 个账户，比单条消息重得多，所以此值远小于 outbox/delay-jobs 的领取上限。
    # 此值不应远大于 worker-pool-size：claim 的瞬间 300s lease 就开始倒计时，
    # 领 20 个但只有 4 个线程时，排在队尾的 job 可能还没开跑 lease 就过期，
    # 被 recoverer 收回重发，原线程白跑一遍（幂等兜底不会出错，但纯属浪费）。
    # 取 2x worker-pool-size：线程刚空出来就有下一个 job 可跑，又不会让排队时间吃掉 lease。
    max-per-run: 8
    # 对应字段：statement_jobs.attempt_count；达到上限置 DEAD。
    max-attempts: 10
    # 对应字段：statement_jobs.claim_until = claim 时刻 + 本值。
    # 300s 是因为一个分片要循环处理上千账户（每账户一个独立事务），远长于单条 publish/投递。
    processing-timeout-seconds: 300
    # 对应代码：WorkerExecutorConfiguration.statementJobWorkerExecutor。
    worker-pool-size: 4
    worker-queue-capacity: 100
  policy:
    # minimum payment = min(total, max(total * rate, currency floor)).
    # 当前只是教学用简化规则，真实发卡系统会按产品条款、余额分层和监管要求配置。
    minimum-payment-rate: 0.10
    minimum-payment-floors:
      JPY: 1000.00
      USD: 25.00
  read-cache:
    # Statement GET read model 的两级 cache：Caffeine L1 + Redis L2。
    # 只缓存可从 MySQL 重建的查询快照，不缓存额度、幂等 claim 或写模型。
    # L1 很快但只在本 JVM 生效，所以 TTL 要短；L2 跨实例共享，所以 TTL 可以稍长。
    # 前缀绑定到 StatementReadCacheProperties，全部消费方是 StatementReadService。
    # 对应代码：StatementReadService 构造 Caffeine.expireAfterWrite(localTtl)。
    local-ttl: 30s
    # 生产 cache 必须有容量上限，避免无限 key 把应用 heap 吃满。
    # 对应代码：Caffeine.maximumSize(localMaximumSize)。
    local-maximum-size: 1000
    remote-ttl: 5m
    # 在基础 TTL 上加随机抖动，避免一批 key 同秒过期后一起回源 MySQL。
    remote-ttl-jitter: 30s
    # 还款 after-commit 写入 L2 的"版本地板"墓碑存活时间。它挡住"迟到写"覆盖新值，
    # 只需活到第一个新鲜 reader 用真实值替换墓碑为止，所以远短于 remote-ttl。
    # 取值要 >= 一个慢 GET 从"读 DB"到"写回 L2"的最大时滞。
    # 对应字段：L2 value 编码为 "<version>|payload"，'|' 后为空即墓碑；版本来自 statements.version。
    # 对应代码：StatementReadService.evictAfterCommit（RepaymentService 在还款事务里注册）。
    tombstone-ttl: 10s
    # 热点 key 重建锁，防缓存击穿(cache breakdown / stampede)：L2 miss 时用一把跨 pod 的 Redis 锁
    # (SET NX PX) 做 single-flight，只有 winner 回源 DB，其余 pod 等它填好 L2 后复用，不重复打库。
    # 它是 best-effort 优化：抢锁失败/超时/Redis 故障一律 fail-open 回源，不是 GET 的硬依赖。
    rebuild-lock-enabled: true
    # 锁持有时间，要 >= 一次"回源 DB + 写回 L2"的正常耗时，否则 winner 没写完锁就过期、放第二个进来；
    # 同时也是持锁者崩溃后的自动释放上限。
    rebuild-lock-ttl: 2s
    # loser 等 winner 填好 L2 的最大自旋次数 × 间隔 = 请求最多被这把锁阻塞多久（这里 5×20ms=100ms 封顶）。
    # 超过后 fail-open 自己回源，绝不让请求无限等在锁上。
    rebuild-lock-wait-attempts: 5
    rebuild-lock-wait-interval: 20ms
    broadcast:
      # 跨 pod L1 失效广播（Redis Pub/Sub）。默认关闭：单实例/测试不需要，跨 pod L1 由 local-ttl 兜底。
      # 开启后，还款 after-commit 会 PUBLISH 一条失效消息，所有 pod 的订阅者清各自 Caffeine L1，
      # 把跨 pod L1 stale 窗口从 local-ttl 压到一次广播延迟。它是 best-effort，丢消息时退回 local-ttl。
      # 它只关 L1 窗口，不解决 L2 late-write 竞态（那要版本号/CAS）。
      enabled: false

repayment:
  auto-debit:
    # 调用链：AutoRepaymentService -> BankDebitGateway port -> BankDebitGatewayAdapter(@CircuitBreaker)
    #   -> BankDebitClient(Feign) -> HTTP -> SimulatedBankController（模拟银行，含幂等去重）。
    # bank-base-url 指向模拟银行；接真实银行/行内扣款网关时只改这里，调用方式不变。
    bank-base-url: http://localhost:8080
    # 默认模拟银行扣款成功；改成 false 可演示"业务性拒绝"路径（200+FAILED，如余额不足）：
    # AutoRepaymentService.debitStatement 收到失败后抛 AutoRepaymentFailedException，
    # DelayJob 按退避重试——客户补足余额后重试就能成功，所以这类失败不进快速 DEAD。
    simulated-success: true
    failure-reason: simulated insufficient bank balance

risk:
  # velocity 限流计数器实现：redis(默认, sliding window, 主库零读压) 或 jdbc(COUNT(*) 精确对照)。
  # 对应代码：RedisRiskVelocityCounter / JdbcRiskVelocityCounter 二选一注入 RiskAssessmentService。
  velocity:
    store: redis
  local:
    # 对应代码：RiskProperties -> RiskAssessmentService，在授权决策链里、账户加锁之前执行。
    velocity-window-seconds: 60
    max-authorizations-per-window: 3
    high-risk-amount-thresholds:
      JPY: 50000.00
      USD: 500.00
    blocked-merchant-ids:
      - merchant-blocked
  external:
    base-url: ${EXTERNAL_RISK_BASE_URL:http://localhost:8080}
    simulated-latency-millis: 100
    failure-rate-percent: 0
    high-risk-score-threshold: 80

# API 入口限流（系统保护层）。与上面 risk.local 的 velocity 业务风控限流分属两层：
# 这里按调用方(客户端 IP)维度保护 POST /api/authorizations 热路径，超限返回 429 + Retry-After；
# velocity 按卡维度识别异常用卡行为，超限走风控 decline。维度、出口、语义都不同。
# 对应代码：RateLimitConfiguration -> AuthorizationRateLimitInterceptor -> RedisTokenBucketRateLimiter。
api:
  rate-limit:
    # kill switch：false 时整个限流装配（含 interceptor）都不注册，切换需要重启。
    enabled: true
    # 令牌桶容量 = 允许的瞬时突发量。冷启动/闲置后重建的桶从满桶开始，第一波允许打满 20 个。
    # 小项目推荐 20；生产大流量若按认证 client 维度且合同允许持续 50/s，可从 burst 100 起步。
    # 生产数字必须来自 client SLA/merchant tier，而不是为了提高系统 QPS统一放宽所有调用方。
    capacity: 20
    # 每秒补充令牌数 = 允许的持续速率。持续洪峰会被压到 10 req/s，多余请求收到 429。
    # 注意这是 per-instance 视角之外的**全局**值：桶在 Redis 里，多实例共享同一个调用方的桶。
    # 小项目推荐 10/s；生产大流量示例可按 authenticated client 从 50/s 起步，并在 gateway 再设全局保护。
    refill-per-second: 10
    # 分桶 key 只读 request.remoteAddr；反向代理场景由网关或 Tomcat RemoteIpValve
    # 按 trusted proxies 解析真实客户端 IP，应用不直接信任可伪造的 X-Forwarded-For。

resilience4j:
  # Resilience4j 把“配置”与“有状态实例”分开：下面每个 instances.<name> 会进入对应 Registry。
  # Java 注解或 registry.rateLimiter("name") 必须使用同一个 name，才能拿到这组阈值和累计状态。
  # CircuitBreaker 看近期健康度，Retry 决定同一调用内再试几次，RateLimiter 控制频率，Bulkhead 控制并发。
  circuitbreaker:
    instances:
      # COUNT_BASED 表示按最近 N 次调用统计，而不是按最近 N 秒统计。
      # 至少积累 minimum-number-of-calls 后才计算失败率，避免启动后的第一个失败立即把 breaker 打开。
      externalRisk:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
      # 每渠道独立断路器：push provider 故障不会连带把 email 熔断。
      # slow-call 阈值必须小于 Feign read-timeout；否则慢调用会先被 timeout 截断，只剩 failure 统计。
      notificationPush:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        slow-call-duration-threshold: 1s
        slow-call-rate-threshold: 100
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        # 本地 RateLimiter 拒绝是我方 client-side throttling，不代表 push provider brownout。
        # 因为装饰顺序是 CircuitBreaker(RateLimiter(providerCall))，这里必须 ignore，
        # 否则限流拒绝会污染 provider 健康统计。
        # provider 4xx 是请求/配置永久错误，不代表 push provider brownout；不计入断路器失败率。
        ignore-exceptions:
          - io.github.resilience4j.ratelimiter.RequestNotPermitted
          - com.minicard.notification.domain.delivery.NotificationDeliveryPermanentException
      notificationEmail:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        slow-call-duration-threshold: 1s
        slow-call-rate-threshold: 100
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        # 本地 RateLimiter 拒绝是我方 client-side throttling，不代表 email provider brownout。
        # 因为装饰顺序是 CircuitBreaker(RateLimiter(providerCall))，这里必须 ignore。
        # provider 4xx 是请求/配置永久错误，不代表 email provider brownout；不计入断路器失败率。
        ignore-exceptions:
          - io.github.resilience4j.ratelimiter.RequestNotPermitted
          - com.minicard.notification.domain.delivery.NotificationDeliveryPermanentException
      # 银行扣款只配熔断，不配 R4j retry：DelayJob 已是带退避的 durable retry 层，
      # 双层重试相乘会放大银行压力；bulkhead 也不需要——调用方跑在有界 worker pool 里。
      # 对应代码：BankDebitGatewayAdapter 的 @CircuitBreaker(name="bankDebit")。
      bankDebit:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        # slow-call 阈值小于 Feign read-timeout(2s)：1s~2s 的"慢但成功"计入熔断统计。
        slow-call-duration-threshold: 1s
        slow-call-rate-threshold: 100
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        # 银行 4xx 是契约/配置永久错误，不代表银行网关 brownout；不计入断路器失败率。
        ignore-exceptions:
          - com.minicard.repayment.application.BankDebitPermanentException
  retry:
    instances:
      # intra-attempt 快速重试：对 provider 抖动做几次内存级退避重试；跨重启的 durable 重试由投递状态机负责。
      notificationDelivery:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        # 断路器已经 OPEN 时，CallNotPermittedException 表示"本轮不要再打 provider"；
        # 如果 retry 继续重试，只会快速失败 3 次并制造噪声，不能提高成功率。
        # RateLimiter 满时，RequestNotPermitted 是我方主动 client-side throttling，不是 provider 抖动；
        # 继续在同一轮 R4j retry 里立刻重试只会继续抢不到许可，应交给 durable retry/backoff。
        # NotificationDeliveryPermanentException 来自 Feign ErrorDecoder 对 4xx 的分类：
        # 这类请求契约/认证/配置错误不靠重试恢复，应交给 worker 直接 DEAD。
        # 异常分类和次数放在同一个实例下，review 时能一次看全 retry budget。
        # 这里使用异常类名字符串：重命名异常类时必须同步修改，否则启动绑定会失败。
        ignore-exceptions:
          - io.github.resilience4j.ratelimiter.RequestNotPermitted
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
          - com.minicard.notification.domain.delivery.NotificationDeliveryPermanentException
  ratelimiter:
    instances:
      # notification provider 的 client-side throttling：限制"本 pod"打外部 provider 的速率。
      # 这和 POST /api/authorizations 的 Redis Lua 入站限流不同：入站限流要跨实例共享状态；
      # 出站 provider quota 通常可以按实例数摊分，放本地内存能少一次 Redis 往返，也避免 Redis 故障
      # 影响后台通知发送。真实生产应按 provider 给的全局 quota / pod 数 / 安全余量配置。
      notificationPush:
        # 小项目推荐 20/s/Pod。生产示例：provider 全局 quota=1000/s、10 Pods、保留 20% headroom，
        # 则每渠道配置约 80/s/Pod；扩/缩 Pod 时必须重算，不能让集群总速率意外越过 provider quota。
        limit-for-period: 20
        limit-refresh-period: 1s
        # 0 = 抢不到许可立刻 fail-fast，不占住 notificationDeliveryWorkerExecutor 等令牌；
        # helper 把 RequestNotPermitted 翻译成 NotificationDeliveryThrottledException，worker 释放 lease，
        # 按 fixed-delay-ms 延后 next_attempt_at，但不增加 attempts，因为 provider HTTP 尚未发生。
        timeout-duration: 0
      notificationEmail:
        # 与 push 分渠道计算；真实 email/push provider 通常配额不同，生产不要机械保持相同数字。
        limit-for-period: 20
        limit-refresh-period: 1s
        timeout-duration: 0
  bulkhead:
    instances:
      externalRisk:
        # 使用 semaphore bulkhead，同线程限并发，不把 @Transactional 内的调用丢到另一个线程。
        # 这个值必须小于 Hikari pool 可用连接数减去 headroom：如果 Hikari 是 10，就不能把 risk bulkhead 配成 10。
        # 这样外部风控全堵时，最多只有 max-concurrent-calls 条授权事务占着连接，其他端点仍有余量。
        # 小项目推荐 4（Hikari=10，必须留连接给其他路径）。生产大流量每 API Pod 可从 8~12 起步，
        # 前提是 Hikari 20~30、provider quota 和压测都支持；事务内 HTTP 未拆前不要直接追求更大。
        max-concurrent-calls: 4
        # 0 表示 bulkhead 满时立即 fail-closed，而不是排队继续占 Tomcat request thread。
        max-wait-duration: 0
