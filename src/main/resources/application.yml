spring:
  application:
    name: mini-card-payment-system
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mini_card}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always

authorization:
  policy:
    single-transaction-limits:
      JPY: 100000.00
      USD: 1000.00
